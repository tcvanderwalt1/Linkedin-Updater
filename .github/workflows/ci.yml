name: CI

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Unit tests (no live API credits)
        run: pytest -q -m "not integration"
        env:
          # Dummy values so Settings loads; tests mock HTTP.
          DATABASE_URL: postgresql://app:test@localhost/neondb?sslmode=require
          APP_PASSWORD: test
          WEBHOOK_URL: ""
